name: Build and Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [sanity-update]  # triggered by Sanity webhook on content publish

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch content from Sanity
        run: node scripts/fetch-content.js
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: production
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}

      - name: Build
        run: npm run build
        env:
          # Sets the base path for assets — matches the GitHub repo name.
          # Change to VITE_BASE: / if you configure a custom domain.
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
