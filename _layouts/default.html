<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-0YMDLWRBK6"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }

      // Default consent to 'denied'
      gtag("consent", "default", {
        ad_storage: "denied",
        analytics_storage: "denied",
      });

      gtag("js", new Date());
      gtag("config", "G-0YMDLWRBK6");

      function acceptCookies() {
        gtag("consent", "update", {
          ad_storage: "granted",
          analytics_storage: "granted",
        });
        document.getElementById("cookie-banner").style.display = "none";
        localStorage.setItem("cookie-consent", "granted");
      }

      function declineCookies() {
        document.getElementById("cookie-banner").style.display = "none";
        localStorage.setItem("cookie-consent", "denied");
      }

      window.onload = function () {
        if (!localStorage.getItem("cookie-consent")) {
          document.getElementById("cookie-banner").style.display = "block";
        } else if (localStorage.getItem("cookie-consent") === "granted") {
          gtag("consent", "update", {
            ad_storage: "granted",
            analytics_storage: "granted",
          });
        }
      };
    </script>
    <title>{{ page.title }} | {{ site.title }}</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 1rem;
        background: #fafafa;
        color: #222;
      }
      header {
        margin-bottom: 2rem;
      }
      nav a {
        margin-right: 1rem;
        color: #0366d6;
        text-decoration: none;
      }
      nav a:hover {
        text-decoration: underline;
      }
      footer {
        margin-top: 2rem;
        font-size: 0.9em;
        color: #888;
      }
      #cookie-banner {
        display: none;
        position: fixed;
        bottom: 0px;
        left: 0px;
        width: 100%;
        background-color: #222;
        color: #fff;
        padding: 1.5rem;
        text-align: center;
        box-sizing: border-box;
      }
      #cookie-banner button {
        margin-left: 1rem;
        padding: 0.5rem 1rem;
        cursor: pointer;
      }
      #cookie-banner .accept {
        background-color: #0366d6;
        color: white;
        border: none;
      }
      #cookie-banner .decline {
        background-color: transparent;
        color: #ccc;
        border: 1px solid #ccc;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>{{ site.title }}</h1>
      <nav>
        <a href="{{ site.baseurl }}/">Home</a>
        <a href="{{ site.baseurl }}/about">About</a>
      </nav>
    </header>
    <main>{{ content }}</main>
    <footer>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</footer>
    <div id="cookie-banner">
      <p>
        This website uses cookies for analytics. Do you consent?
        <button class="accept" onclick="acceptCookies()">Accept</button>
        <button class="decline" onclick="declineCookies()">Decline</button>
      </p>
    </div>
  </body>
</html>
